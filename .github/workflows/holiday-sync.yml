name: Holiday Sync

on:
  workflow_dispatch:

  schedule:
    # 1st day of every month at 02:00 UTC
    - cron: "0 2 1 * *"

    # 15th day of every month at 02:00 UTC
    - cron: "0 2 15 * *"

permissions:
  contents: write

jobs:
  sync-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JQ
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Fetch and Validate Indian Holidays
        env:
          CALENDARIFIC_API_KEY: ${{ secrets.CALENDARIFIC_API_KEY }}
        run: |
          mkdir -p holidays/IN

          if [ -z "$CALENDARIFIC_API_KEY" ]; then
            echo "::error::CALENDARIFIC_API_KEY secret is not set!"
            exit 1
          fi

          echo "Fetching Indian holidays for 2026..."

          HTTP_CODE=$(curl -s -w "%{http_code}" -o temp_response.json \
            --retry 3 --retry-delay 5 \
            "https://calendarific.com/api/v2/holidays?api_key=${CALENDARIFIC_API_KEY}&country=IN&year=2026")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API request failed with HTTP status code $HTTP_CODE"
            cat temp_response.json
            exit 1
          fi

          if ! jq empty temp_response.json >/dev/null 2>&1; then
            echo "::error::Invalid JSON returned from Calendarific."
            cat temp_response.json
            exit 1
          fi

          META_CODE=$(jq -r '.meta.code // empty' temp_response.json)

          if [ "$META_CODE" != "200" ]; then
            ERROR_MSG=$(jq -r '.meta.error_detail // "Unknown error"' temp_response.json)
            echo "::error::$ERROR_MSG"
            cat temp_response.json
            exit 1
          fi

          HOLIDAYS_COUNT=$(jq '.response.holidays | length' temp_response.json)

          if [ "$HOLIDAYS_COUNT" -eq 0 ]; then
            echo "::error::No holidays returned."
            exit 1
          fi

          echo "Fetched $HOLIDAYS_COUNT holidays."

          jq '[.response.holidays[] | {
            name,
            description,
            date: {iso: .date.iso},
            type
          }]' temp_response.json > temp_filtered.json

          if [ -f holidays/IN/2026.json ] && cmp -s holidays/IN/2026.json temp_filtered.json; then
            echo "No changes."
            rm temp_filtered.json temp_response.json
            exit 0
          fi

          mv temp_filtered.json holidays/IN/2026.json

          mkdir -p holidays

          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg updated "$UPDATED" \
            --argjson count "$HOLIDAYS_COUNT" \
            '{
              version:1,
              updated:$updated,
              countries:{
                IN:{
                  "2026":{
                    lastUpdated:$updated,
                    holidayCount:$count
                  }
                }
              }
            }' > holidays/metadata.json

          rm temp_response.json

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add holidays/

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Update Indian holidays [skip ci]"
          git push
